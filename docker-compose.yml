services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapsehub-db
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapsehub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapsehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: synapsehub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/synapsehub-files --ignore-existing;
      echo 'Bucket synapsehub-files created';
      "

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: synapsehub-app
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 3777
      HOST: 0.0.0.0
      LOG_LEVEL: info
      DATABASE_URL: postgresql://synapse:synapse@postgres:5432/synapsehub
      STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: synapsehub-files
      S3_REGION: us-east-1
      EMBEDDING_PROVIDER: mock
      EMBEDDING_DIMENSION: 128
      MASTER_API_KEY: synapse-dev-master-key
    ports:
      - "3777:3777"

volumes:
  pgdata:
  miniodata:
